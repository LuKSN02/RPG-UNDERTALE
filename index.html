<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptáculo</title>
    <link rel="icon" type="image/png" href="./Undertale.png">

    <style>
        /* --- FONTES TERMINAL --- */
        @import url('https://fonts.googleapis.com');

        :root {
            --color-active: #00ff00;
            --font-terminal: 'Share Tech Mono', monospace;
            --font-main: 'Inconsolata', monospace;
            --crt-opacity: 0.07;
        }

        .hp-bar-border, .sheet-box, #rpg-sheet, .weapon-box-v39 {
    border-color: var(--color-active) !important;
    box-shadow: 0 0 15px rgba(var(--color-active-rgb), 0.3);
}

#hp-fill, #tp-f39, #abt-f39 {
    background: var(--color-active) !important;
    box-shadow: 0 0 10px var(--color-active);
}

.sheet-name, .hp-label, .opt-v39, .item-btn:hover {
    color: var(--color-active) !important;
}

        /* --- ESTRUTURA --- */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        [contenteditable] { user-select: text; cursor: text; outline: none; border-bottom: 1px dashed #444; }

        body, html {
            background-color: #000; color: #fff;
            font-family: var(--font-main);
            height: 100vh; width: 100vw;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* --- ATMOSFERA CRT --- */
        .tv-static { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://media.giphy.com'); opacity: var(--crt-opacity); z-index: 100000; pointer-events: none; }
        .crt-lines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%); background-size: 100% 3px; z-index: 100001; pointer-events: none; }
        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle at center, rgba(255,255,255,0.02) 0%, #000 100%); }

        /* --- UI SELEÇÃO --- */
        .main-ui { position: relative; z-index: 100; width: 95%; max-width: 1000px; text-align: center; margin-top: -80px; }
        .tv-off { animation: crt-off 0.6s forwards; }
        @keyframes crt-off { 0% { transform: scale(1,1); } 40% { transform: scale(1.4, 0.005); filter: brightness(5); } 100% { transform: scale(0,0); } }

        .game-title { font-family: var(--font-terminal); font-size: 1.5rem; letter-spacing: 12px; margin-bottom: 50px; color: #aaa; text-shadow: 0 0 5px #aaa; }
        .receptacle-grid { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; }
        .soul-box { width: 130px; height: 180px; border: 1px solid #333; background: rgba(0,0,0,0.8); cursor: pointer; position: relative; display: flex; justify-content: center; align-items: center; transition: 0.4s; }
        .soul-box.active { border-color: var(--color-active); box-shadow: 0 0 20px var(--color-active); transform: scale(1.05); }
        .heart-soul { position: absolute; font-size: 3rem; color: var(--color-active); text-shadow: 0 0 15px var(--color-active); animation: heart-pulse 1.5s infinite; }
        @keyframes heart-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        .name-label { font-family: var(--font-terminal); font-size: 4rem; color: var(--color-active); letter-spacing: 15px; height: 80px; text-transform: uppercase; text-shadow: 0 0 10px var(--color-active); }
        .name-label span { display: inline-block; animation: wave 1.5s infinite; animation-delay: calc(0.1s * var(--i)); }
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .desc-label { font-size: 1.4rem; color: #666; min-height: 80px; white-space: pre-line; letter-spacing: 2px; }

        .btn-confirm { 
            margin-top: 40px; background: transparent; border: 1px solid #fff; color: #fff; padding: 12px 60px; font-family: var(--font-terminal); font-size: 1.8rem; cursor: pointer; letter-spacing: 5px; transition: 0.4s; position: relative; box-shadow: 0 0 10px var(--color-active); text-shadow: 0 0 5px #fff;
        }
        .btn-confirm:hover { background: #fff; color: #000; box-shadow: 0 0 30px var(--color-active), 0 0 60px var(--color-active); transform: translateY(-2px); }

        /* --- TELA DE DEBOCHE (AJUSTADA) --- */
        #mock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 50000; display: none; justify-content: center; align-items: center; flex-direction: column; text-align: center; }
        .mock-title { font-family: var(--font-terminal); font-size: 5rem; color: var(--color-active); text-shadow: 0 0 20px var(--color-active); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 10px; }
        .mock-desc { font-family: var(--font-terminal); font-size: 2.2rem; color: var(--color-active); opacity: 0.8; max-width: 80%; line-height: 1.4; letter-spacing: 3px; }

        /* --- FICHA RPG --- */
        #final-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 50001; justify-content: center; align-items: center; }
        #rpg-sheet { border: 1px solid #fff; padding: 40px; width: 900px; background: #000; position: relative; transition: 0.5s; }
        
        .lv-up-glow { animation: lv-glow 0.8s ease-out; }
        @keyframes lv-glow { 
            0% { box-shadow: 0 0 0px var(--color-active); }
            50% { box-shadow: 0 0 150px var(--color-active); border-color: var(--color-active); filter: brightness(1.5); }
            100% { box-shadow: 0 0 0px var(--color-active); }
        }

        .sheet-header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .sheet-name { font-family: var(--font-terminal); font-size: 3rem; color: var(--color-active); text-shadow: 0 0 8px var(--color-active); text-transform: uppercase; }
        .sheet-lv-info { font-size: 1.8rem; font-weight: 300; color: #888; }

        .hp-section { display: flex; align-items: center; gap: 20px; margin: 30px 0; }
        .hp-bar-border { width: 400px; height: 30px; background: #111; border: 1px solid #444; position: relative; }
        #hp-fill { height: 100%; width: 100%; background: var(--color-active); transition: width 0.3s; box-shadow: 0 0 15px var(--color-active); }
        .hp-label { font-size: 1.8rem; font-family: var(--font-terminal); }

        .sheet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .sheet-box { border: 1px solid #222; padding: 20px; min-height: 200px; background: rgba(255,255,255,0.01); box-shadow: inset 0 0 10px rgba(0,0,0,1); }
        .sheet-box h3 { font-family: var(--font-terminal); font-size: 1.1rem; color: #444; border-bottom: 1px solid #222; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 3px; }
        
        .item-btn { cursor: pointer; font-size: 1.4rem; display: block; margin-bottom: 10px; transition: 0.2s; list-style: none; color: #ccc; }
        .item-btn:hover { color: var(--color-active); transform: translateX(10px); }

        .sheet-controls, #dice-panel { display: flex; gap: 20px; margin-top: 40px; justify-content: center; width: 100%; }
        #dice-panel { display: none; }

        .btn-sheet { font-family: var(--font-terminal); background: transparent; border: 1px solid #fff; color: #fff; padding: 10px 35px; font-size: 1.2rem; cursor: pointer; transition: 0.2s; letter-spacing: 2px; }
        .btn-sheet:hover { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }

        #slash-effect { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18rem; color: #fff; opacity: 0; pointer-events: none; z-index: 60000; }
        .slash-anim { animation: slash 0.4s ease-out; }
        .crit-anim { animation: slash 0.4s ease-out; color: #ffff00 !important; font-size: 25rem !important; text-shadow: 0 0 40px #ff0; }
        @keyframes slash { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(-45deg); } 50% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5) rotate(45deg); } }
        
        #flash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 60002; }
        .flash-anim { animation: flash-effect 0.3s; }
        @keyframes flash-effect { 0% { opacity: 1; } 100% { opacity: 0; } }

        #damage-text { font-family: var(--font-terminal); position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; color: #ff0000; opacity: 0; pointer-events: none; z-index: 60001; }
        @keyframes floatDmg { 0% { opacity: 1; transform: translate(-50%, -50%); } 100% { opacity: 0; transform: translate(-50%, -100%); } }

        .shake { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(0, 0); } }

        /* EFEITO DE ESCURECER PERSONAGENS */
.soul-img-display {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
    /* Deixa escuro e sem cor por padrão */
    filter: brightness(0.2) grayscale(1); 
    transition: filter 0.4s ease, transform 0.4s ease;
}

/* Quando o quadrado for selecionado (.active) */
.soul-box.active .soul-img-display {
    filter: brightness(1) grayscale(0); /* Volta ao brilho e cor normal */
    transform: scale(1.05); /* Pequeno zoom para destaque */
}

/* Garante que o coração fique sempre visível no topo */
.heart-soul {
    z-index: 2;
    pointer-events: none;
}

/* CONTAINER DAS CARTAS COM PERSPECTIVA */
.receptacle-grid {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 40px;
    perspective: 1000px; /* Ativa o mundo 3D para os filhos */
}

/* BASE DA CARTA */
.soul-box {
    width: 130px;
    height: 180px;
    border: 1px solid #333;
    background: rgba(0,0,0,0.8);
    cursor: pointer;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    
    /* Animação de Flutuar (Cartas Voando) */
    animation: floatCard 4s ease-in-out infinite;
    animation-delay: calc(var(--i) * 0.5s); /* Cada uma voa em um tempo diferente */
    
    /* Suavidade para o efeito 3D */
    transition: transform 0.3s ease, border-color 0.4s, box-shadow 0.4s, filter 0.4s;
    transform-style: preserve-3d;
}

/* EFEITO DE MOVIMENTO 3D AO PASSAR O MOUSE */
.soul-box:hover {
    filter: brightness(1.2);
    /* Inclina a carta no eixo X e Y para o efeito 3D */
    transform: translateY(-15px) rotateX(10deg) rotateY(10deg) scale(1.1);
    border-color: var(--color-active);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    z-index: 10;
}

/* CARTA SELECIONADA (Fica fixa e brilhante) */
.soul-box.active {
    border-color: var(--color-active);
    box-shadow: 0 0 30px var(--color-active);
    transform: translateY(-10px) scale(1.05);
    filter: brightness(1) grayscale(0);
    animation: none; /* Para de flutuar quando selecionada */
}

/* IMAGEM DENTRO DA CARTA */
.soul-img-display {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.3) grayscale(1);
    transition: 0.4s;
}

.soul-box.active .soul-img-display {
    filter: brightness(1) grayscale(0);
}

/* KEYFRAMES PARA FLUTUAR */
@keyframes floatCard {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}


        .soul-img-display {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Preenche o quadrado sem distorcer */
    opacity: 0.6;      /* Fica levemente transparente para combinar com o clima */
    pointer-events: none;
}
/* Esconde o ícone de imagem quebrada se estiver vazio */
.soul-img-display:not([src]), .soul-img-display[src=""] { opacity: 0; }

/* PARTÍCULA DE ALMA */
.soul-particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: var(--color-active);
    pointer-events: none;
    z-index: 5;
    box-shadow: 0 0 8px var(--color-active);
    animation: particleFly 1.5s linear forwards;
}

@keyframes particleFly {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-100px) translateX(var(--x)) scale(0); opacity: 0; }
}

/* BRILHO INTENSO NA CARTA ATIVA */
.soul-box.active {
    border-color: var(--color-active) !important;
    box-shadow: 0 0 40px var(--color-active), inset 0 0 20px var(--color-active) !important;
    transition: 0.5s ease-in-out;
}

/* EFEITO DE VARREDURA (SCANLINE) NA CARTA */
.soul-box.active::after {
    content: "";
    position: absolute;
    top: -100%;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(transparent, rgba(255,255,255,0.1), transparent);
    animation: scanline 3s infinite;
}

@keyframes scanline {
    0% { top: -100%; }
    100% { top: 100%; }
}

@keyframes cardGlitch {
    0% { clip-path: inset(10% 0 30% 0); transform: translateX(-5px); }
    20% { clip-path: inset(40% 0 10% 0); transform: translateX(5px); }
    40% { clip-path: inset(10% 0 30% 0); transform: translateX(-5px); }
    100% { clip-path: inset(0 0 0 0); transform: translateX(0); }
}

.soul-box.active {
    animation: cardGlitch 0.3s ease-out;
}

.soul-box::before {
    content: "";
    position: absolute;
    top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
    transform: skewX(-25deg);
    transition: 0.5s;
}

.soul-box:hover::before {
    left: 150%;
}

/* Animação de sumiço do item */
.item-dissolve {
    animation: dissolve 0.5s forwards;
    pointer-events: none;
}

@keyframes dissolve {
    0% { opacity: 1; transform: translateX(0); filter: brightness(2); }
    100% { opacity: 0; transform: translateY(-20px) scale(1.2); filter: blur(4px); }
}

/* Partícula de "poeira" que sobe */
.dust-particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #fff;
    pointer-events: none;
    z-index: 10000;
    animation: dustFly 0.8s ease-out forwards;
}

@keyframes dustFly {
    0% { transform: translate(0, 0); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
}

.shaking-text {
    display: inline-block;
    animation: jitter 0.15s infinite;
    color: var(--color-active);
}

@keyframes jitter {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    25% { transform: translate(-1px, -1px) rotate(1deg); }
    50% { transform: translate(1px, -1px) rotate(-1deg); }
    75% { transform: translate(-1px, 1px) rotate(0deg); }
    100% { transform: translate(1px, 1px) rotate(1deg); }
}

/* --- NOVAS ANIMAÇÕES --- */

/* 1. Efeito de Dissolver Item */
.item-dissolve {
    animation: dissolve 0.5s forwards;
    pointer-events: none;
}
@keyframes dissolve {
    0% { opacity: 1; transform: scale(1); filter: brightness(2); }
    100% { opacity: 0; transform: translateY(-20px) scale(1.2); filter: blur(4px); }
}

/* 2. Partículas de Poeira (Dust) */
.dust-particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    pointer-events: none;
    z-index: 10000;
    animation: dustFly 0.8s ease-out forwards;
}
@keyframes dustFly {
    0% { transform: translate(0, 0); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
}

/* 3. Texto Tremendo (Estilo Gaster) */
.shaking-text {
    display: inline-block;
    animation: jitter 0.15s infinite;
    color: var(--color-active);
}
@keyframes jitter {
    0% { transform: translate(1px, 1px); }
    25% { transform: translate(-1px, -1px); }
    50% { transform: translate(1px, -1px); }
    100% { transform: translate(0, 0); }
}

/* 4. Flash de Crítico (Inversão) */
.critical-impact {
    animation: critFlash 0.2s steps(2);
}
@keyframes critFlash {
    0%, 100% { filter: invert(0); }
    50% { filter: invert(1) brightness(1.5); }
}

.hp-low {
    animation: hp-danger 0.5s infinite alternate;
    color: #ff0000 !important;
}
@keyframes hp-danger {
    from { opacity: 1; filter: brightness(1); }
    to { opacity: 0.5; filter: brightness(2); text-shadow: 0 0 10px #f00; }
}

/* Tela de Game Over */
/* Força a tela de Game Over a aparecer sobre TUDO */
#game-over-screen {
    position: fixed !important;
    top: 0 !important; left: 0 !important;
    width: 100vw !important; height: 100vh !important;
    background: black !important;
    display: none; /* O JS mudará para flex */
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999999999 !important;
}

#soul-anchor {
    position: relative;
    width: 20px; height: 20px;
    display: flex; justify-content: center; align-items: center;
}

.soul-shatter-piece {
    position: absolute;
    color: white; font-size: 2rem;
    pointer-events: none;
    animation: shatter-fly 1.2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
}

@keyframes shatter-fly {
    0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) rotate(var(--dr)); opacity: 0; }
}

.soul-break { 
    animation: break-shake 0.5s linear forwards; 
    clip-path: polygon(0% 0%, 48% 0%, 45% 100%, 0% 100%); /* Efeito de racha */
}
@keyframes break-shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(3px); }
    75% { transform: translateX(-3px); }
}

/* Efeito de estática agressiva */
.tv-static.glitch-mode {
    opacity: 0.4 !important; /* Aumenta muito a visibilidade da estática */
    filter: contrast(200%) brightness(150%);
    animation: static-shake 0.1s infinite;
}

@keyframes static-shake {
    0% { transform: translate(0,0); }
    50% { transform: translate(-5px, 5px); }
    100% { transform: translate(5px, -5px); }
}

/* Brilho extra na barra ABT quando está cheia */
.abt-full {
    animation: abt-glow 0.5s infinite alternate;
}
@keyframes abt-glow {
    from { box-shadow: 0 0 5px #00ffcc; filter: brightness(1); }
    to { box-shadow: 0 0 25px #00ffcc; filter: brightness(1.8); }
}



        /* Painel Flutuante de Magias */
#magic-menu-v12 {
    display: none; 
    position: fixed; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%);
    width: 380px; 
    background: #000; 
    border: 2px solid #0080ff; 
    padding: 20px; 
    z-index: 99999;
    box-shadow: 0 0 40px rgba(0, 128, 255, 0.4);
    text-align: center;
}

.mag-item { 
    border: 1px solid #333; 
    padding: 12px; 
    margin-bottom: 10px; 
    cursor: pointer; 
    color: #0080ff; 
    font-family: var(--font-terminal);
    font-size: 1.1rem;
    transition: 0.2s;
}

.mag-item:hover { 
    background: rgba(0, 128, 255, 0.1); 
    border-color: #0080ff; 
    transform: scale(1.02);
}

/* Efeito de vibração e cor de erro */
.shake-error {
    animation: shakeV15 0.3s ease-in-out;
    border-color: #ff0000 !important;
    box-shadow: 0 0 40px #ff0000 !important;
}

@keyframes shakeV15 {
    0%, 100% { transform: translate(-50%, -50%); }
    25% { transform: translate(-52%, -50%); }
    75% { transform: translate(-48%, -50%); }
}

#error-msg-v15 {
    color: #ff0000;
    font-size: 0.8rem;
    margin-top: 10px;
    display: none;
    text-shadow: 0 0 5px #ff0000;
}



    </style>
</head>
<body>

    <div id="game-over-screen">
    <div id="soul-anchor" style="position: relative;"></div>
    <div class="go-text" id="go-text">FIQUE DETERMINADO...</div>
    <button class="btn-sheet" style="margin-top:30px; opacity:0; transition:2s;" id="retry-btn" onclick="location.reload()">TENTAR NOVAMENTE</button>
</div>

    <div class="tv-static"></div>
    <div class="crt-lines"></div>
    <canvas id="snow-canvas"></canvas>
    <div id="flash-screen"></div>
    <div id="slash-effect">/</div>
    <div id="damage-text"></div>

    <div id="mock-screen">
        <h2 class="mock-title" id="mock-title"></h2>
        <div class="mock-desc" id="mock-desc"></div>
    </div>

    <div id="final-overlay">
        <div id="rpg-sheet">
            <div class="sheet-header">
                <div class="sheet-name" id="sheet-name">DETERMINAÇÃO</div>
                <div class="sheet-lv-info">LV <span id="sheet-lv">1</span>&nbsp;&nbsp;&nbsp;EXP: <span id="sheet-exp">0</span> / <span id="next-exp">150</span></div>
            </div>

            <div class="hp-section">
                <span class="hp-label">HP</span>
                <div class="hp-bar-border"><div id="hp-fill"></div></div>
                <div class="hp-label"><span id="curr-hp">20</span> / <span id="max-hp">20</span></div>
            </div>

            <div class="sheet-grid">
                <div class="col">
                    <div class="sheet-box" style="margin-bottom: 20px; min-height: auto;">
                        <h3>ATRIBUTOS</h3>
                        <div style="font-size: 1.8rem; font-weight: bold;">AT: <span contenteditable="true" id="sheet-at">15</span></div>
                        <div style="font-size: 1.8rem; font-weight: bold;">DF: <span contenteditable="true" id="sheet-df">10</span></div>
                    </div>
                    <div class="sheet-box">
                        <h3>INVENTÁRIO (5 ITENS)</h3>
                        <ul id="inv-list"></ul>
                    </div>
                </div>
                <div class="col">
                    <div class="sheet-box" style="height: 100%;">
                        <h3>HABILIDADES</h3>
                        <ul id="skill-list" contenteditable="true" style="list-style: none; font-size: 1.4rem; line-height: 2.2; color: #888;"></ul>
                    </div>
                </div>
            </div>

    <script>
        const SOUL_CONFIG = {

            'coragem': { color: '#ffa500', desc: 'O DESTEMOR DIANTE DO PERIGO.\nVOCÊ É O PRIMEIRO A ENTRAR.', mock: 'O ABISMO NÃO SE IMPORTA COM O SEU GRITO.', hp: 35, items: [{n:'Luvas Robustas', h:10}, {n:'Bife Rosto', h:25}, {n:'Lanche Herói', h:15}, {n:'Chá Batalha', h:10}, {n:'Maçã Gelada', h:15}], skills: '<li>- Investida</li><li>- Rugido</li>' },
            'gentileza': { color: '#ffff00', desc: 'O CUIDADO COM O PRÓXIMO.\nSUA LUZ CURA AS FERIDAS.', mock: 'O MUNDO VAI DEVORAR VOCÊ COM UM SORRISO.', hp: 25, items: [{n:'Salada Flores', h:25}, {n:'Frigideira', h:10}, {n:'Sopa Almas', h:20}, {n:'Pão Caseiro', h:15}, {n:'Suco Luz', h:10}], skills: '<li>- Curar</li><li>- Escudo</li>' },
            'empatia': { color: '#ff69b4', desc: 'O ELO QUE UNE AS ALMAS.\nVOCÊ SENTE O PULSO DE TODOS.', mock: 'SENTIR A DOR DOS OUTROS SÓ VAI TE MATAR MAIS RÁPIDO.', hp: 18, items: [{n:'Chá Sorriso', h:15}, {n:'Laço Rosa', h:8}, {n:'Doce Sonho', h:20}, {n:'Biscoito Coração', h:10}, {n:'Água Pura', h:15}], skills: '<li>- Conectar</li><li>- Sentir</li>' }
        };

        let currentKey = 'determinacao';
        let typeTimer;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(f, t, d, v, s=0) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            if(s) o.frequency.exponentialRampToValueAtTime(s, audioCtx.currentTime + d);
            g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        }

        function setWave(text) {
            const el = document.getElementById('name-label'); el.innerHTML = "";
            text.toUpperCase().split("").forEach((c, i) => {
                const span = document.createElement('span'); span.innerText = c;
                span.style.setProperty('--i', i); el.appendChild(span);
            });
        }

        function selectSoul(key, color, el) {
    currentKey = key;
    
    // 1. Atualiza a Cor Principal
    document.documentElement.style.setProperty('--color-active', color);
    
    // 2. Converte HEX para RGB para as sombras (Efeito Glow)
    const r = parseInt(color.slice(1, 3), 16);
    const g = parseInt(color.slice(3, 5), 16);
    const b = parseInt(color.slice(5, 7), 16);
    document.documentElement.style.setProperty('--color-active-rgb', `${r}, ${g}, ${b}`);

    // 3. Atualiza a UI das Almas (Coração)
    document.querySelectorAll('.soul-box').forEach(box => {
        box.classList.remove('active');
        const h = box.querySelector('.heart-soul');
        if (h) h.style.display = 'none';
    });
    
    el.classList.add('active');
    const activeHeart = el.querySelector('.heart-soul');
    if (activeHeart) {
        activeHeart.style.display = 'block';
        activeHeart.style.color = color;
    }

    // 4. Feedback Visual e Sonoro
    setWave(key); 
    typeWriter(SOUL_CONFIG[key].desc, 'desc-label');
    
    // Som de seleção estilo Undertale
    if (window.sfx) sfx(200, 'square', 0.1, 0.05, 300);
}


        function initTransition() {
            document.getElementById('ui-container').classList.add('tv-off');
            sfx(800, 'sine', 0.5, 0.1, 1);
            setTimeout(() => {
                document.getElementById('ui-container').style.display = 'none';
                const mockTitle = document.getElementById('mock-title');
                const mockScr = document.getElementById('mock-screen');
                mockScr.style.display = 'flex';
                mockTitle.innerText = currentKey.toUpperCase() + "?";
                typeWriter(SOUL_CONFIG[currentKey].mock, 'mock-desc', () => {
                    setTimeout(() => {
                        mockScr.style.display = 'none';
                        document.getElementById('final-overlay').style.display = 'flex';
                        setupSheet();
                    }, 5000);
                });
            }, 600);
        }

        function setupSheet() {
            const data = SOUL_CONFIG[currentKey];
            document.getElementById('sheet-name').innerText = currentKey;
            document.getElementById('max-hp').innerText = data.hp;
            document.getElementById('curr-hp').innerText = data.hp;
            document.getElementById('skill-list').innerHTML = data.skills;
            const inv = document.getElementById('inv-list'); inv.innerHTML = "";
            data.items.forEach(item => {
                const li = document.createElement('li'); li.className = 'item-btn'; li.innerText = "- " + item.n + " (+" + item.h + "HP)";
                li.onclick = () => { 
                    sfx(400, 'sine', 0.05, 0.03);
                    let curr = parseInt(document.getElementById('curr-hp').innerText);
                    let max = parseInt(document.getElementById('max-hp').innerText);
                    if(curr < max) { document.getElementById('curr-hp').innerText = Math.min(max, curr + item.h); updateHP(); sfx(800, 'sine', 0.4, 0.1, 1200); li.remove(); }
                };
                inv.appendChild(li);
            });
            updateHP(); sfx(400, 'square', 0.3, 0.1, 600);
        }

        function updateHP() {
            const curr = parseInt(document.getElementById('curr-hp').innerText);
            const max = parseInt(document.getElementById('max-hp').innerText);
            document.getElementById('hp-fill').style.width = (curr/max*100) + "%";
            const hpVal = parseInt(document.getElementById('curr-hp').innerText);
const maxVal = parseInt(document.getElementById('max-hp').innerText);
const label = document.querySelector('.hp-label');
if (hpVal <= maxVal * 0.2) {
    label.classList.add('hp-low');
} else {
    label.classList.remove('hp-low');
}

        }

        function openDice() { document.getElementById('sheet-controls').style.display = 'none'; document.getElementById('dice-panel').style.display = 'flex'; sfx(300, 'square', 0.1, 0.05); }

        function rollDice(sides) {
            const roll = Math.floor(Math.random() * sides) + 1;
            const lv = parseInt(document.getElementById('sheet-lv').innerText);
            const bonus = lv === 2 ? 5 : (lv >= 3 ? 10 : 0);
            const finalDmg = roll + bonus;
            const isCrit = roll === sides;
            document.getElementById('dice-panel').style.display = 'none';
            document.getElementById('sheet-controls').style.display = 'flex';
            const slash = document.getElementById('slash-effect');
            const dmgTxt = document.getElementById('damage-text');
            const flash = document.getElementById('flash-screen');
            slash.className = isCrit ? 'crit-anim' : 'slash-anim';
            document.getElementById('rpg-sheet').classList.add('shake');
            if(isCrit) { flash.classList.add('flash-anim'); sfx(1200, 'sawtooth', 0.4, 0.15, 300); setTimeout(() => flash.classList.remove('flash-anim'), 300); }
            else { sfx(600, 'sawtooth', 0.3, 0.1, 100); }
            dmgTxt.innerText = "DANO: " + finalDmg + (bonus > 0 ? " (+" + bonus + ")" : "");
            dmgTxt.style.color = isCrit ? "#ffff00" : "#ff0000";
            dmgTxt.style.animation = 'floatDmg 1.5s forwards';
            setTimeout(() => { slash.className = ""; document.getElementById('rpg-sheet').classList.remove('shake'); dmgTxt.style.animation = 'none'; }, 1500);
        }

        function addExp() {
            let exp = parseInt(document.getElementById('sheet-exp').innerText) + 1;
            let lv = parseInt(document.getElementById('sheet-lv').innerText);
            let next = parseInt(document.getElementById('next-exp').innerText);
            if(exp >= next) {
                lv++; exp = 0; next = lv * 150;
                document.getElementById('sheet-lv').innerText = lv;
                document.getElementById('next-exp').innerText = next;
                let max = parseInt(document.getElementById('max-hp').innerText) + 15;
                document.getElementById('max-hp').innerText = max; document.getElementById('curr-hp').innerText = max;
                updateHP(); sfx(500, 'square', 0.6, 0.1, 1500);
                const sheet = document.getElementById('rpg-sheet');
                sheet.classList.add('lv-up-glow');
                setTimeout(() => sheet.classList.remove('lv-up-glow'), 800);
            }
            document.getElementById('sheet-exp').innerText = exp; sfx(1000, 'sine', 0.05, 0.02);
        }

        window.takeDamage = function() {
    // 1. Pega os elementos de HP
    let c = document.getElementById('curr-hp');

};

        function typeWriter(text, id, callback) {
            const el = document.getElementById(id); el.innerHTML = "";
            clearInterval(typeTimer); let i = 0;
            typeTimer = setInterval(() => {
                if(i < text.length) { el.innerHTML += text[i] === "\n" ? "<br>" : text[i]; if(text[i] !== " ") sfx(110, 'sine', 0.04, 0.02); i++; }
                else { clearInterval(typeTimer); if(callback) callback(); }
            }, 45);
        }

// Função para criar uma partícula
function createParticle(el) {
    const rect = el.getBoundingClientRect();
    const particle = document.createElement('div');
    particle.className = 'soul-particle';
    
    // Posição aleatória na base da carta
    const x = Math.random() * rect.width;
    particle.style.left = x + 'px';
    particle.style.bottom = '0px';
    
    // Direção aleatória horizontal para a animação
    const moveX = (Math.random() - 0.5) * 50;
    particle.style.setProperty('--x', `${moveX}px`);
    
    el.appendChild(particle);
    
    // Remove a partícula após a animação
    setTimeout(() => { particle.remove(); }, 1500);
}

        const canvas = document.getElementById('snow-canvas'); const ctx = canvas.getContext('2d');
        let snow = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; snow = Array.from({length: 100}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1+0.5 })); }
        function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Pega a cor atual da Alma para pintar a neve
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--color-active');
    
    snow.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
        ctx.fill();
        
        p.y += p.s; 
        // Adiciona um leve balanço horizontal (Vento do Void)
        p.x += Math.sin(p.y * 0.01) * 0.5; 
        
        if (p.y > canvas.height) p.y = -5;
        if (p.x > canvas.width) p.x = 0;
        if (p.x < 0) p.x = canvas.width;
    });
    requestAnimationFrame(loop);
}


                window.onresize = resize; resize(); loop();

     SISTEMA DE RPG SUPREMO V39 - VERSÃO INTEGRAL FINAL ATUALIZADA
     ============================================================== -->
<style>
    /* 1. CENTRALIZAÇÃO E LAYOUT DA FICHA */
    #final-overlay { display: none; position: fixed!important; top:0; left:0; width:100vw; height:100vh; background:#000; z-index:50001; justify-content:center!important; align-items:center!important; }
    #rpg-sheet { position: relative!important; transform: scale(0.9)!important; border: 1px solid #fff; width: 850px!important; background: #000; margin: 0!important; padding: 25px!important; }

    /* 2. LAYOUT LADO A LADO (BARRAS + ARMA) */
    .stats-flex-v39 { display: flex; justify-content: space-between; align-items: center; padding: 0 45px; margin: 15px 0; gap: 30px; }
    .bars-stack-v39 { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    
    /* NOVO: CONTAINER DA ARMA COM DADO */
    .weapon-box-v39 {
    position: relative;
    overflow: hidden;
}
.dice-btn-v39 { font-size: 2.2rem; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 0 5px var(--color-active)); }
    .dice-spin { animation: spinV39 0.5s linear infinite; }
.weapon-box-v39::before {
    content: "";
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: conic-gradient(transparent, var(--color-active), transparent 30%);
    animation: rotate-aura 4s linear infinite;
    opacity: 0.3;
}

@keyframes rotate-aura {
    100% { transform: rotate(360deg); }
}
   
    .weapon-box-v39 {
        width: 140px; height: 140px; border: 2px double var(--color-active);
        background: rgba(0,0,0,0.8); box-shadow: 0 0 20px var(--color-active);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        position: relative; overflow: hidden; cursor: pointer;
    }
    .weapon-img-v39 { width: 75%; height: 75%; object-fit: contain; image-rendering: pixelated; filter: drop-shadow(0 0 5px var(--color-active)); }
    .weapon-txt-v39 { position: absolute; bottom: 4px; font-family: var(--font-terminal); font-size: 0.65rem; color: var(--color-active); text-transform: uppercase; background: #000; padding: 0 5px; outline: none; }

    /* 3. COMBATE E ANIMAÇÕES */
    #slash-v39 { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 15rem; color: #fff; z-index: 1000000; pointer-events: none; display: none; text-shadow: 0 0 20px #fff; }
    .slash-anim { display: block !important; animation: slashA 0.4s ease-out forwards; }
    @keyframes slashA { 0% { opacity:0; transform:translate(-50%,-50%) scale(0.5) rotate(-45deg); } 50% { opacity:1; } 100% { opacity:0; transform:translate(-50%,-50%) scale(1.5) rotate(45deg); } }
    
    #damage-text { font-family: var(--font-terminal); position: fixed!important; top: 40%!important; left: 50%!important; transform: translate(-50%, -50%)!important; font-size: 8rem!important; z-index: 999999!important; pointer-events: none; color: #ff0000; text-shadow: 0 0 20px #000; opacity: 0; }
    .float-dmg-v39 { animation: fDmgV39 2.8s forwards !important; }
    @keyframes fDmgV39 { 0% { opacity:1; transform:translate(-50%, -50%) scale(1.2); } 100% { opacity:0; transform:translate(-50%, -180%); } }
    .crit-gold { color: #ffff00 !important; text-shadow: 0 0 30px #ff0, 0 0 10px #000 !important; }

    /* 4. BOTÕES AJUSTADOS (PARA NÃO SAÍREM DA FICHA) */
    #sheet-controls { display: flex !important; flex-wrap: wrap !important; justify-content: center !important; gap: 8px !important; margin-top: 20px !important; width: 100% !important; }
    .btn-sheet { flex: 1 1 120px; max-width: 135px; text-align: center; padding: 8px 2px !important; font-size: 0.8rem !important; white-space: nowrap; }

    /* 5. POUPAR E MENUS */
    #spare-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000000; opacity: 0; }
    .f-success { animation: flG 0.6s ease-out; } .f-fail { animation: flR 0.6s ease-out; }
    @keyframes flG { 0% { opacity: 0.6; background: #00ff00; } 100% { opacity: 0; } }
    @keyframes flR { 0% { opacity: 0.5; background: #ff0000; } 100% { opacity: 0; } }

    #win-dice, #win-mag { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 380px; background: #000; border: 2px solid var(--color-active); padding: 25px; z-index: 1000005; box-shadow: 0 0 40px var(--color-active); text-align: center; font-family: var(--font-terminal); }
    .opt-v39 { border: 1px solid #222; padding: 12px; margin-bottom: 8px; cursor: pointer; color: var(--color-active); }
    .opt-v39:hover { background: var(--color-active); color: #000; }
    #log-v39 { margin-top: 15px; height: 80px; border: 1px solid #222; padding: 10px; font-family: var(--font-terminal); font-size: 1.1rem; color: #555; overflow-y: auto; text-align: left; }
    #inv-list { font-size: 1.2rem !important; min-height: 120px; outline: none; }
    .battle-box-expand {
    animation: expandBox 0.3s cubic-bezier(0, 1, 0.5, 1);
    overflow: hidden;
}
@keyframes expandBox {
    from { transform: scaleX(0); opacity: 0; }
    to { transform: scaleX(1); opacity: 1; }
}

</style>

<div id="slash-v39">/</div>
<div id="spare-flash"></div>
<div id="damage-text">0</div>
<div id="win-dice">
    <div style="color:#fff; margin-bottom:15px;">DADO DE ATAQUE</div>
    <button class="btn-sheet" style="width:100%; margin-bottom:10px" onclick="window.rollV39(20)">1d20 (PRECISÃO)</button>
    <button class="btn-sheet" style="width:100%" onclick="window.rollV39(12)">1d12 (BRUTALIDADE)</button>
</div>
<div id="mag-ov" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000001;" onclick="window.closeM39()"></div>
<div id="win-mag"><div id="mag-list-v39"></div><button class="btn-sheet" style="width:100%; margin-top:15px; border-color:#333;" onclick="window.closeM39()">FECHAR</button></div>

<script>
(function() {
    const ASSETS = {
        'determinacao': { w: 'FACA BRINQUEDO', url: 'https://images.tcdn.com.br', m: [{n:'CORTE RUBRO', c:20, d:'Dano Crítico'}, {n:'RECUSAR', c:50, d:'Cura 20 HP'}] },
        'coragem': { w: 'LUVAS ROBUSTAS', url: 'https://cdn.awsli.com.br', m: [{n:'IMPACTO LARANJA', c:15, d:'Atordoar'}, {n:'INVESTIDA', c:60, d:'Dano Crítico'}] },
        'gentileza': { w: 'FRIGIDEIRA', url: 'https://sc04.alicdn.com', m: [{n:'CURA AMARELA', c:25, d:'Cura 30 HP'}, {n:'ESCUDO', c:20, d:'Defesa 80%'}] },
        'empatia': { w: 'LAÇO ROSA', url: 'https://images.tcdn.com.br', m: [{n:'ELO ROSA', c:15, d:'Sente Alma'}, {n:'ABRAÇO', c:70, d:'Cura Total'}] }
    };

    const obs = new MutationObserver(() => {
        const hpS = document.querySelector('.hp-section'), foot = document.getElementById('sheet-controls'), inv = document.getElementById('inv-list');
        if (hpS && !document.getElementById('inj-v39')) {
            const wrapper = document.createElement('div'); wrapper.id = 'inj-v39'; wrapper.className = 'stats-flex-v39';
            const k = typeof currentKey !== 'undefined' ? currentKey : 'determinacao';
            const data = ASSETS[k] || ASSETS['determinacao'];
            
            // Persistência individual por alma
            const savedImg = localStorage.getItem(`weapon_img_${k}`) || data.url;
            const savedName = localStorage.getItem(`weapon_name_${k}`) || data.w;

            wrapper.innerHTML = `
                <div class="bars-stack-v39">
                    <div style="display:flex;align-items:center;gap:12px;font-family:var(--font-terminal)"><span style="color:#0080ff;min-width:35px">TP</span><div style="width:250px;height:18px;background:#111;border:1px solid #333;position:relative"><div id="tp-f39" style="height:100%;width:50%;background:#0080ff;box-shadow:0 0 10px #0080ff;transition:0.3s"></div></div><span style="color:#888"><span id="v-tp39">50</span>/100</span><button onclick="window.adj39('tp',1)" style="background:none;border:1px solid #333;color:#888;cursor:pointer;padding:0 5px">+</button></div>
<div style="display:flex;align-items:center;gap:12px;font-family:var(--font-terminal)">
    <span style="color:#00ffcc;min-width:35px">ABT</span>
    <div style="width:250px;height:18px;background:#111;border:1px solid #333;position:relative">
        <div id="abt-f39" style="height:100%;width:0%;background:#00ffcc;box-shadow:0 0 10px #00ffcc;transition:0.3s"></div>
    </div>
    <span style="color:#888"><span id="v-abt39">0</span>/100</span>
    
    <!-- Botões de ajuste: Note o botão de "-" adicionado -->
    <div style="display:flex; gap:5px;">
        <button onclick="window.adj39('abt',-1)" style="background:none;border:1px solid #333;color:#888;cursor:pointer;padding:0 8px;font-family:var(--font-terminal)">-</button>
        <button onclick="window.adj39('abt',1)" style="background:none;border:1px solid #333;color:#888;cursor:pointer;padding:0 8px;font-family:var(--font-terminal)">+</button>
    </div>
</div>

                    <div id="log-v39">> SISTEMA ATIVO.</div>
                </div>
                <div class="weapon-area-v39">
                    <div class="dice-btn-v39" onclick="window.rollQuickDice(this)">🎲</div>
                    <div class="weapon-box-v39" onclick="document.getElementById('weapon-input').click()">
                        <img id="w-img-v39" src="${savedImg}" class="weapon-img-v39">
                        <span id="w-txt-v39" class="weapon-txt-v39" contenteditable="true" onblur="window.saveWeaponName(this.innerText)" onclick="event.stopPropagation()">${savedName}</span>
                        <input type="file" id="weapon-input" style="display:none" accept="image/*" onchange="window.uploadWeapon(this)">
                    </div>
                </div>`;
            hpS.parentNode.insertBefore(wrapper, hpS.nextSibling);
            
            // Botões Alinhados
            if(foot) {
                foot.innerHTML = `<button class="btn-sheet" onclick="window.openDiceV39()">ATAQUE</button><button class="btn-sheet" onclick="addExp()">+ EXP</button><button class="btn-sheet" onclick="takeDamage()">DANO</button><button class="btn-sheet" style="color:#0f0;border-color:#0f0" onclick="window.fullR39()">RESTAURAR</button><button class="btn-sheet" style="color:#ff0;border-color:#ff0" onclick="window.spareV39()">POUPAR</button><button class="btn-sheet" style="color:#08f;border-color:#08f" onclick="window.openM39()">MAGIAS</button>`;
            }

            // Lógica de Inventário original (Sua Parte 2)
            if(inv) {
                inv.contentEditable = "true"; inv.onclick = (e) => { if(e.target.tagName === 'LI') window.useI39(e.target); };
                const b = document.createElement('button'); b.innerText="[+] ADICIONAR ITEM (+10HP)"; b.style="width:100%;background:none;border:1px dashed #333;color:#444;cursor:pointer;padding:5px;font-family:var(--font-terminal);";
                b.onclick = () => { const li = document.createElement('li'); li.innerText="- Novo Item (+10HP)"; inv.appendChild(li); };
                inv.parentNode.appendChild(b);
            }
        }
    });
    obs.observe(document.body, { childList: true, subtree: true });

    // --- FUNÇÕES DA ARMA E DADO ---
    window.rollQuickDice = (el) => {
        el.classList.add('dice-spin');
        if(window.sfx) sfx(600, 'square', 0.1, 0.05);
        setTimeout(() => {
            el.classList.remove('dice-spin');
            const res = Math.floor(Math.random() * 20) + 1;
            window.logV39(`DADO (1d20): ${res}`, res === 20 ? "#ff0" : "#fff");
        }, 500);
    };

    window.uploadWeapon = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const k = typeof currentKey !== 'undefined' ? currentKey : 'determinacao';
                document.getElementById('w-img-v39').src = e.target.result;
                localStorage.setItem(`weapon_img_${k}`, e.target.result);
            };
            reader.readAsDataURL(input.files[0]);
        }
    };
    window.saveWeaponName = (name) => { 
        const k = typeof currentKey !== 'undefined' ? currentKey : 'determinacao';
        localStorage.setItem(`weapon_name_${k}`, name); 
    };

    // --- TODA A LÓGICA ORIGINAL DA PARTE 2 ---
    window.openDiceV39 = () => { document.getElementById('win-dice').style.display='block'; if(window.sfx) sfx(400,'square',0.1,0.05); };
    window.rollV39 = (s) => {
        document.getElementById('win-dice').style.display='none'; 
        const r=Math.floor(Math.random()*s)+1, cr=(r===s), lv=parseInt(document.getElementById('sheet-lv')?.innerText || 1);
        let d = r+(lv*5); if(cr) d*=2; 
        const sl=document.getElementById('slash-v39'); sl.classList.remove('slash-anim'); void sl.offsetWidth; sl.classList.add('slash-anim');
        if(window.sfx) sfx(150,'sawtooth',0.3,0.1,100);
        setTimeout(() => { 
            const t=document.getElementById('damage-text'); t.innerText=cr?"CRITICAL!\n"+d:d; 
            if(cr) t.classList.add('crit-gold'); else t.classList.remove('crit-gold');
            t.classList.remove('float-dmg-v39'); void t.offsetWidth; t.classList.add('float-dmg-v39'); window.logV39(`ATAQUE: ${d} ${cr?'(CRIT!)':''}`);
        }, 200);
        if(cr) {
    document.body.classList.add('critical-impact');
    setTimeout(() => document.body.classList.remove('critical-impact'), 200);
}
    };
    

    window.spareV39 = () => {
        const r=()=>Math.floor(Math.random()*20)+1, t=r()+r(); const fl=document.getElementById('spare-flash'); fl.className=""; void fl.offsetWidth;
        if(t>=25){ fl.classList.add('f-success'); window.logV39(`POUPAR SUCESSO (${t})`,"#0f0"); if(window.sfx) sfx(800,'sine',0.6,0.1); }
        else { fl.classList.add('f-fail'); window.logV39(`POUPAR FALHA (${t})`,"#f00"); if(window.sfx) sfx(100,'sawtooth',0.4,0.1); }
    };

    window.adj39 = (t,a) => { const e=document.getElementById('v-'+t+'39'), f=document.getElementById(t+'-f39'); if(e){ let v=Math.max(0,Math.min(100,parseInt(e.innerText)+a)); e.innerText=v; f.style.width=v+"%"; } };
    window.logV39 = (m,c="#666") => { const l=document.getElementById('log-v39'); if(l) l.innerHTML=`<span style="color:${c}">> ${m}</span><br>`+l.innerHTML; };
    window.useI39 = (el) => {
    const h = el.innerText.match(/\(\+(\d+)HP\)/i);
    if(h){
        let c = parseInt(document.getElementById('curr-hp').innerText);
        let mx = parseInt(document.getElementById('max-hp').innerText);
        
        if(c < mx){
            // EFEITO VISUAL DE POEIRA
            el.classList.add('item-dissolve');
            for(let i=0; i<8; i++) {
                const p = document.createElement('div');
                p.className = 'dust-particle';
                p.style.left = el.getBoundingClientRect().left + 'px';
                p.style.top = el.getBoundingClientRect().top + 'px';
                p.style.setProperty('--dx', (Math.random() - 0.5) * 60 + 'px');
                p.style.setProperty('--dy', -(Math.random() * 40 + 20) + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }

            document.getElementById('curr-hp').innerText = Math.min(mx, c + parseInt(h[1]));
            if(window.updateHP) updateHP();
            if(window.sfx) sfx(800, 'sine', 0.3, 0.1);
            
            // Remove o item depois da animação
            setTimeout(() => el.remove(), 500);
        }
    }
};


// FORÇAR O BOTÃO DE DANO A USAR ESTA LÓGICA
setInterval(() => {
    const btnDano = Array.from(document.querySelectorAll('button')).find(b => b.innerText === "DANO");
    if (btnDano && !btnDano.dataset.hooked) {
        btnDano.onclick = () => window.takeDamage();
        btnDano.dataset.hooked = "true"; // Evita loop infinito
    }
}, 500);

window.takeDamage = function() {
    const hpEl = document.getElementById('curr-hp');
    if (!hpEl) return;

    let hp = parseInt(hpEl.innerText);
    hp = Math.max(0, hp - 5); // Tira 5 de vida
    hpEl.innerText = hp;

    if (window.updateHP) updateHP();
    if (window.sfx) sfx(150, 'sawtooth', 0.1, 0.1);

    if (hp <= 0) {
        window.triggerGameOver();
    }
};

window.triggerGameOver = function() {
    const goScreen = document.getElementById('game-over-screen');
    const finalOverlay = document.getElementById('final-overlay');
    const anchor = document.getElementById('soul-anchor');

    if (finalOverlay) finalOverlay.style.display = 'none';
    if (goScreen) goScreen.style.display = 'flex';
    
    anchor.innerHTML = '<span id="dying-soul" style="color:#fff; font-size:4rem;">❤</span>';
    
    setTimeout(() => {
        const soul = document.getElementById('dying-soul');
        if (soul) soul.classList.add('soul-break');
        if (window.sfx) sfx(80, 'square', 0.1, 0.2); 

        setTimeout(() => {
            if (soul) soul.style.display = 'none';
            for(let i=0; i<12; i++) {
                const p = document.createElement('div');
                p.className = 'soul-shatter-piece';
                p.innerText = '❤';
                p.style.setProperty('--dx', (Math.random() - 0.5) * 600 + 'px');
                p.style.setProperty('--dy', (Math.random() - 0.5) * 600 + 'px');
                p.style.setProperty('--dr', (Math.random() * 720) + 'deg');
                anchor.appendChild(p);
            }
            if (window.sfx) sfx(40, 'sawtooth', 0.8, 0.2);

            setTimeout(() => {
                document.getElementById('go-text').style.opacity = "1";
                document.getElementById('retry-btn').style.opacity = "1";
            }, 2000);
        }, 1000);
    }, 1500);
};

    window.openM39 = () => {
        const m=document.getElementById('win-mag'), l=document.getElementById('mag-list-v39'); l.innerHTML="";
        const k = typeof currentKey !== 'undefined' ? currentKey : 'determinacao';
        (ASSETS[k].m).forEach(s => { const d=document.createElement('div'); d.className='opt-v39'; d.innerHTML=`${s.n}<br><small style="color:#444">${s.c}TP - ${s.d}</small>`;
            d.onclick=()=>{ if(parseInt(document.getElementById('v-tp39').innerText)>=s.c){ window.adj39('tp',-s.c); window.closeM39(); if(window.sfx) sfx(1200,'sine',0.4,0.1); } else { if(window.sfx) sfx(100,'sawtooth',0.2,0.1); } }; l.appendChild(d); });
        m.style.display='block'; document.getElementById('mag-ov').style.display='block';
    };
    window.closeM39 = () => { document.getElementById('win-mag').style.display='none'; document.getElementById('mag-ov').style.display='none'; };
    window.fullR39 = () => { document.getElementById('curr-hp').innerText=document.getElementById('max-hp').innerText; if(window.updateHP) updateHP(); window.adj39('tp',100); if(window.sfx) sfx(800,'sine',0.5,0.1); };
    window.takeDamage = function() { let c=document.getElementById('curr-hp'); if(parseInt(c.innerText)>0){ c.innerText=parseInt(c.innerText)-1; if(window.updateHP) updateHP(); if(window.sfx) sfx(150,'sawtooth',0.1,0.1); } };

    // Lógica de Transição original
    const oldInitV39 = window.initTransition;
    window.initTransition = function() { clearInterval(window.typeTimer); if(oldInitV39) oldInitV39(); setTimeout(() => {
            const t=document.getElementById('mock-title'), d=document.getElementById('mock-desc'); if(t) t.innerText=""; if(d) d.innerText="";
            typeWriter(currentKey.toUpperCase()+"?",'mock-title', () => { setTimeout(()=>typeWriter(SOUL_CONFIG[currentKey].mock,'mock-desc', () => {
                setTimeout(() => { document.getElementById('mock-screen').style.display='none'; document.getElementById('final-overlay').style.display='flex'; setupSheet(); }, 1500);
            }), 400); });
    }, 700); };
})();
</script>
